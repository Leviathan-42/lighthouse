server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # When accessed directly on LAN (port 8097) the /vega prefix is NOT stripped
  # by Traefik. Strip it here so both paths work identically.
  location ^~ /vega {
    rewrite ^/vega(/.*)?$ $1 last;
  }

  # Proxy media API calls directly to lighthouse-api, bypassing Traefik auth.
  location /api/ {
    proxy_pass http://lighthouse-api:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  add_header X-Content-Type-Options nosniff;
  add_header Referrer-Policy same-origin;
}
