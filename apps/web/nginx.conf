server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — all routes serve index.html, React Router (if added later) handles the rest.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Aggressive caching on hashed assets, no-cache on the entry HTML.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Basic security headers — `tailscale serve` handles TLS upstream.
  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options DENY;
  add_header Referrer-Policy same-origin;
}
