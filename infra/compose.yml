# Lighthouse production stack.
# Exposed externally only on 127.0.0.1:8080 — `tailscale serve` fronts this
# with TLS and publishes it onto the tailnet (see step 8).
#
# Run with: docker compose -f infra/compose.yml --env-file .env up -d
# (from the repo root, so LIGHTHOUSE_DATA_DIR etc. resolve)

name: lighthouse

networks:
  lighthouse:
    name: lighthouse
    driver: bridge

volumes:
  prometheus-data:
  loki-data:
  lighthouse-data:
  traefik-data:

services:
  traefik:
    image: traefik:v3.2
    container_name: lighthouse-traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=lighthouse
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=false
      - --log.level=INFO
      - --accesslog=true
    ports:
      # bound to loopback so only `tailscale serve` can reach it
      - "127.0.0.1:8080:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik/dynamic:ro
      - traefik-data:/letsencrypt
    networks:
      - lighthouse

  lighthouse-api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: lighthouse/api:latest
    container_name: lighthouse-api
    restart: unless-stopped
    environment:
      LIGHTHOUSE_PORT: 4000
      LIGHTHOUSE_HOST: 0.0.0.0
      LIGHTHOUSE_DATA_DIR: /data
      LIGHTHOUSE_LOG_LEVEL: ${LIGHTHOUSE_LOG_LEVEL:-info}
      LIGHTHOUSE_AUTH_BYPASS: ${LIGHTHOUSE_AUTH_BYPASS:-}
      DOCKER_SOCK: /var/run/docker.sock
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      TAILSCALE_CLIENT_ID: ${TAILSCALE_CLIENT_ID:-}
      TAILSCALE_CLIENT_SECRET: ${TAILSCALE_CLIENT_SECRET:-}
      TAILSCALE_TAILNET: ${TAILSCALE_TAILNET:-}
      GITEA_URL: ${GITEA_URL:-}
      GITEA_TOKEN: ${GITEA_TOKEN:-}
      GITEA_WEBHOOK_SECRET: ${GITEA_WEBHOOK_SECRET:-}
      NODE_ENV: production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - lighthouse-data:/data
    labels:
      traefik.enable: "true"
      traefik.docker.network: "lighthouse"
      traefik.http.routers.lh-api.rule: "PathPrefix(`/api`) || PathPrefix(`/healthz`) || PathPrefix(`/readyz`)"
      traefik.http.routers.lh-api.entrypoints: "web"
      traefik.http.routers.lh-api.priority: "10"
      traefik.http.services.lh-api.loadbalancer.server.port: "4000"
      # Forward Tailscale-User-Login — set by `tailscale serve` at the edge
      traefik.http.routers.lh-api.middlewares: "lh-ts-headers@file"
    networks:
      - lighthouse
    depends_on:
      - prometheus
      - loki

  lighthouse-web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    image: lighthouse/web:latest
    container_name: lighthouse-web
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.docker.network: "lighthouse"
      traefik.http.routers.lh-web.rule: "PathPrefix(`/`)"
      traefik.http.routers.lh-web.entrypoints: "web"
      traefik.http.routers.lh-web.priority: "1"
      traefik.http.services.lh-web.loadbalancer.server.port: "80"
    networks:
      - lighthouse

  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: lighthouse-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - lighthouse

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: lighthouse-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg:/dev/kmsg
    networks:
      - lighthouse

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: lighthouse-node-exporter
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - lighthouse

  loki:
    image: grafana/loki:3.2.1
    container_name: lighthouse-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - lighthouse

  promtail:
    image: grafana/promtail:3.2.1
    container_name: lighthouse-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - lighthouse
    depends_on:
      - loki
