# Zurg config. Keep it minimal — defaults are fine for most setups.
# Quote the token; RD tokens are long and may look confusing to YAML.
zurg: v1
token: "REPLACE_ME"
port: 9999
concurrent_workers: 20
check_for_changes_every_secs: 10
retain_rd_torrent_name: true
retain_folder_name_extension: true
enable_repair: true
