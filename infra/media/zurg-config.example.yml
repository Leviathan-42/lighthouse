# Zurg config. Single-quoted regex strings so YAML leaves them alone.
zurg: v1
token: "REPLACE_ME"
port: 9999
concurrent_workers: 20
check_for_changes_every_secs: 10
retain_rd_torrent_name: true
retain_folder_name_extension: true
enable_repair: true
# NOTE: zurg iterates directories alphabetically, so within the same group,
# the name that sorts first "wins" matching torrents. We name the catch-all
# "videos" (v > s) so the narrower "shows" filter matches first.
directories:
  shows:
    group: 1
    filters:
      - any_file_inside_regex: '/(s\d+e\d+|season[\s._-]?\d+|complete|- \d+|episode \d+)/i'
  videos:
    group: 1
    filters:
      - any_file_inside_regex: '/\.(mkv|mp4|avi|m4v)$/i'
